name: Liatrio Daily Lead Generator
on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
jobs:
  generate-leads:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run lead generator
        run: python lead_generator.py
      - name: Research contacts via Claude API
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python salesnav_automation.py --no-browser --date $(date +'%Y-%m-%d')
      - name: Commit and push results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add output/
          git commit -m "Liatrio leads $(date +'%Y-%m-%d')" || echo "No new leads"
          git push
